interface:
  display_name: "Paper Reader"
  short_description: "Create formal visual LLM paper reports"
  default_prompt: "Use $llm-paper-reader to create a formal Chinese academic explanation report for this LLM paper. Start from the complete conceptual architecture, explain mechanisms and formulas at calculation level, recursively expand pseudocode until paper-specific modules are no longer unexplained black boxes, and embed cropped original figures/tables where they support understanding."
