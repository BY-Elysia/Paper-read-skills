interface:
  display_name: "Paper Reader"
  short_description: "Create formal visual LLM paper reports"
  default_prompt: "Use $llm-paper-reader to create a formal Chinese academic explanation report for this LLM paper. Start from the complete conceptual architecture. For every understanding-critical mechanism, expose exact calculations, tensor flow, control/selection rules, learning path, one concrete trace, and recursively expanded pseudocode. Explain formulas operator by operator, render all mathematical notation correctly in Markdown and unpack compact expressions at first use, embed only cropped useful original figures/tables, never full-page renders, and distinguish author-stated limitations and future work from report-level analysis."
